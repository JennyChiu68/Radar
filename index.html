<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>美伊红线雷达 | 48小时升级风险雷达</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script defer src="./radar.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#FF3B30",
            surface: "#0a0c10",
            "surface-container": "#111418",
            "surface-container-low": "#0d1117",
            "surface-container-lowest": "#010409",
            "on-surface": "#f0f6fc",
            "on-surface-variant": "#c9d1d9",
            "outline-variant": "#30363d",
            tertiary: "#fcc419",
            success: "#58d68d"
          },
          borderRadius: {
            DEFAULT: "4px"
          },
          fontFamily: {
            headline: ["Space Grotesk", "Noto Sans SC"],
            body: ["Inter", "Noto Sans SC"],
            label: ["Space Grotesk", "Noto Sans SC"],
            "serif-headline": ["Noto Serif SC", "serif"]
          }
        }
      }
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
      vertical-align: middle;
    }
    .grid-texture {
      background-image: radial-gradient(rgba(255, 59, 48, 0.08) 1px, transparent 0);
      background-size: 20px 20px;
    }
    .radar-sweep {
      background: conic-gradient(from 0deg at 50% 50%, rgba(255, 59, 48, 0.15) 0deg, transparent 90deg);
      animation: rotate 8s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .panel-glass {
      background: rgba(17, 20, 24, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(48, 54, 61, 0.5);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    .radar-grid-line {
      stroke: rgba(255, 59, 48, 0.2);
      stroke-width: 1;
    }
    .radar-text {
      fill: rgba(240, 246, 252, 0.3);
      font-family: "Space Grotesk";
      font-size: 8px;
    }
    @keyframes breathing {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(255, 59, 48, 0.5); }
      50% { opacity: 0.6; text-shadow: 0 0 20px rgba(255, 59, 48, 0.8); }
    }
    .emergency-glow {
      animation: breathing 2s ease-in-out infinite;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .gauge-container {
      position: relative;
      width: 64px;
      height: 36px;
      overflow: hidden;
    }
    .gauge-background {
      fill: none;
      stroke: rgba(48, 54, 61, 0.8);
      stroke-width: 5;
      stroke-linecap: round;
    }
    .gauge-value {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 63;
      transition: stroke-dashoffset 1s ease-out;
    }
    .heavy-serif {
      font-family: "Noto Serif SC", serif !important;
      font-weight: 900 !important;
    }
    .flag-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 180px;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
      mask-image: linear-gradient(to bottom, black 40%, transparent);
      opacity: 0.15;
    }
    .us-flag {
      background: linear-gradient(to bottom, #B22234 7.69%, #FFFFFF 7.69%, #FFFFFF 15.38%, #B22234 15.38%, #B22234 23.07%, #FFFFFF 23.07%, #FFFFFF 30.76%, #B22234 30.76%, #B22234 38.45%, #FFFFFF 38.45%, #FFFFFF 46.14%, #B22234 46.14%, #B22234 53.83%, #FFFFFF 53.83%, #FFFFFF 61.52%, #B22234 61.52%, #B22234 69.21%, #FFFFFF 69.21%, #FFFFFF 76.9%, #B22234 76.9%, #B22234 84.59%, #FFFFFF 84.59%, #FFFFFF 92.28%, #B22234 92.28%);
      position: relative;
    }
    .us-flag-stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: 53.83%;
      background-color: #3C3B6E;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      padding: 2px;
      gap: 1px;
    }
    .star {
      background-color: white;
      border-radius: 50%;
      width: 2px;
      height: 2px;
    }
    .iran-flag {
      display: flex;
      flex-direction: column;
    }
    .iran-green { height: 33.33%; background: #239E46; }
    .iran-white {
      height: 33.33%;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .iran-red { height: 33.33%; background: #DA291C; }
    .iran-emblem {
      width: 14px;
      height: 14px;
      background-color: #DA291C;
      mask-image: radial-gradient(circle at 50% 50%, transparent 40%, black 41%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 40%, black 41%);
      border-radius: 50%;
    }
    .radar-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 2px;
      padding: 2px 6px;
      backdrop-filter: blur(4px);
    }
    .radar-tag span {
      display: block;
      line-height: 1;
    }
  </style>
</head>
<body class="bg-[#0D1117] text-on-surface font-body selection:bg-primary/30 antialiased overflow-x-hidden min-h-screen flex justify-center text-[18px]">
  <div class="w-full max-w-[450px] min-w-[320px] bg-surface min-h-screen grid-texture pb-12 px-6 relative shadow-2xl shadow-black/80 border-x border-outline-variant/20 overflow-x-hidden">
    <div class="flag-bg-container flex justify-between">
      <div class="w-48 h-28 us-flag -rotate-12 transform -translate-x-10 -translate-y-4 opacity-40">
        <div class="us-flag-stars">
          <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
          <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        </div>
      </div>
      <div class="w-48 h-28 iran-flag rotate-12 transform translate-x-10 -translate-y-4 opacity-40">
        <div class="iran-green"></div>
        <div class="iran-white"><div class="iran-emblem"></div></div>
        <div class="iran-red"></div>
      </div>
    </div>

    <div id="loadError" class="hidden relative z-20 mt-8 rounded-lg border border-primary/30 bg-surface-container-low px-4 py-3 text-sm text-on-surface-variant"></div>

    <div id="mainApp" class="relative z-10">
      <header class="py-6 flex flex-col gap-3">
        <div class="flex justify-between items-center px-1">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 bg-primary rounded-full animate-pulse"></span>
            <span class="font-label tracking-widest text-primary/80 font-bold uppercase text-[13px]">金十数据·实时更新</span>
          </div>
          <span id="radar-date-display" class="font-label text-on-surface-variant/60 uppercase text-[13px] transition-colors duration-300">2026.04.09 / 13:56:00</span>
        </div>
        <div class="flex items-end justify-between border-b border-primary/20 pb-4">
          <div>
            <h1 id="brand-title" class="text-4xl heavy-serif tracking-tight text-on-surface">美伊红线雷达</h1>
            <p id="brand-subtitle" class="text-[13px] font-bold text-on-surface-variant tracking-[0.1em] mt-1.5 uppercase">48小时升级风险雷达</p>
          </div>
          <div id="alertBadge" class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-primary text-2xl emergency-glow">error</span>
            <span class="text-[14px] font-bold text-primary tracking-tighter emergency-glow">紧急警报</span>
          </div>
        </div>
      </header>

      <div class="flex flex-col gap-6 mt-2">
        <div class="panel-glass rounded-lg relative aspect-square overflow-hidden border-primary/20 bg-black/40 flex items-center justify-center">
          <div class="absolute inset-0 radar-sweep rounded-full opacity-50"></div>
          <svg class="absolute inset-0 w-full h-full" viewBox="0 0 200 200">
            <circle class="radar-grid-line" cx="100" cy="100" fill="none" r="80"></circle>
            <circle class="radar-grid-line" cx="100" cy="100" fill="none" r="60"></circle>
            <circle class="radar-grid-line" cx="100" cy="100" fill="none" r="40"></circle>
            <circle class="radar-grid-line" cx="100" cy="100" fill="none" r="20"></circle>
            <line class="radar-grid-line" x1="100" x2="100" y1="20" y2="180"></line>
            <line class="radar-grid-line" x1="20" x2="180" y1="100" y2="100"></line>
            <text class="radar-text" x="102" y="18">100</text>
            <text class="radar-text" x="102" y="106">0</text>
          </svg>
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-40 flex flex-col items-center bg-surface-container/95 rounded-full w-20 h-20 justify-center border border-primary/30 shadow-2xl">
            <div class="flex flex-col items-center justify-center text-center">
              <span class="text-[14px] text-primary font-bold tracking-tight uppercase mb-0.5">升级指数</span>
              <span id="hero-score" class="text-2xl font-black font-headline text-white leading-none">82%</span>
            </div>
          </div>
          <a href="#core-indicators-section" class="absolute bottom-3 right-3 z-50 bg-primary/90 text-white text-[10px] font-bold px-2 py-1 rounded backdrop-blur-md flex items-center gap-1 shadow-lg shadow-primary/30 hover:bg-primary transition-colors">
            核心指标监测 <span class="material-symbols-outlined text-[12px]">open_in_new</span>
          </a>
          <div id="radar-blips"></div>
        </div>

        <div id="summaryCards" class="grid grid-cols-3 gap-3"></div>

        <div class="grid grid-cols-2 gap-4 mt-2">
          <div class="panel-glass p-3 rounded-lg flex flex-col min-h-[160px]">
            <div class="flex items-center gap-1.5 mb-3 border-b border-white/5 pb-2">
              <span class="material-symbols-outlined text-[16px] text-on-surface-variant">history</span>
              <span class="text-[10px] font-black font-headline uppercase tracking-widest leading-tight">过去48小时关键转折</span>
            </div>
            <div id="timeline-items" class="flex-1 space-y-2"></div>
          </div>

          <div class="panel-glass p-3 rounded-lg flex flex-col min-h-[160px]">
            <div class="flex items-center gap-1.5 mb-3 border-b border-primary/20 pb-2">
              <span class="material-symbols-outlined text-[16px] text-primary">sensors</span>
              <span class="text-[10px] font-black font-headline uppercase tracking-widest leading-tight">未来48小时盯什么</span>
            </div>
            <div id="watchlist-items" class="space-y-3"></div>
          </div>
        </div>

        <div class="panel-glass p-4 rounded-lg flex flex-col mt-4">
          <div class="flex items-center gap-1.5 mb-3 border-b border-primary/20 pb-2">
            <span class="material-symbols-outlined text-[16px] text-primary">grid_view</span>
            <span id="history-title" class="text-[12px] font-black font-headline uppercase tracking-widest leading-tight">过去41天战争历史指数</span>
          </div>
          <div class="flex items-center justify-end gap-3 mb-3">
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-success/80 rounded-[2px]"></span><span class="text-[9px] text-on-surface-variant font-bold">短暂缓和</span></div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-tertiary/80 rounded-[2px]"></span><span class="text-[9px] text-on-surface-variant font-bold">胶着脆弱</span></div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 bg-primary/80 rounded-[2px]"></span><span class="text-[9px] text-on-surface-variant font-bold">升级高压</span></div>
          </div>
          <div id="heatmap-grid" class="grid grid-cols-7 gap-1.5"></div>
          <button id="heatmap-toggle" type="button" class="mt-4 w-full text-[10px] font-bold text-on-surface-variant bg-surface-container-lowest/50 border border-outline-variant/30 py-2 rounded uppercase tracking-widest">
            展开全部 41 天
          </button>
        </div>

        <section id="core-indicators-section" class="mt-4 space-y-5">
          <div class="flex items-center gap-3 px-1">
            <span class="w-6 h-0.5 bg-primary"></span>
            <h2 class="text-[16px] font-black font-headline tracking-[0.2em] uppercase">核心指标监测</h2>
          </div>
          <div id="core-indicators" class="space-y-4"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="history-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/80 backdrop-blur-sm px-6 opacity-0 transition-opacity duration-300">
    <div id="history-modal-content" class="panel-glass p-6 rounded-lg w-full max-w-[360px] border-outline-variant/30 relative transform scale-95 transition-transform duration-300">
      <button id="history-modal-close" type="button" class="absolute top-3 right-3 text-on-surface-variant hover:text-white">
        <span class="material-symbols-outlined text-[24px]">close</span>
      </button>
      <div class="flex items-center gap-2 mb-4">
        <span id="modal-color" class="w-2.5 h-2.5 rounded-full bg-primary"></span>
        <h3 id="modal-title" class="text-[15px] font-black tracking-widest uppercase text-on-surface">X月X日</h3>
      </div>
      <div class="flex items-center justify-center py-4 border-y border-outline-variant/20 mb-4 bg-surface-container-lowest/40 rounded">
        <div class="text-center">
          <span class="text-[10px] text-on-surface-variant font-bold tracking-widest uppercase mb-1 block">当日综合升级指数</span>
          <span id="modal-index" class="text-4xl font-black font-headline leading-none text-primary">82%</span>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-x-4 gap-y-2 mb-4 bg-black/20 p-3 rounded border border-outline-variant/10">
        <div class="flex justify-between items-center"><span class="text-[10px] text-on-surface-variant">霍尔木兹</span><span id="m-hormuz" class="text-[11px] font-black">--%</span></div>
        <div class="flex justify-between items-center"><span class="text-[10px] text-on-surface-variant">谈判状态</span><span id="m-nego" class="text-[11px] font-black">--%</span></div>
        <div class="flex justify-between items-center"><span class="text-[10px] text-on-surface-variant">新战线</span><span id="m-front" class="text-[11px] font-black">--%</span></div>
        <div class="flex justify-between items-center"><span class="text-[10px] text-on-surface-variant">民用基建</span><span id="m-civil" class="text-[11px] font-black">--%</span></div>
        <div class="flex justify-between items-center"><span class="text-[10px] text-on-surface-variant">能源安全</span><span id="m-energy" class="text-[11px] font-black">--%</span></div>
      </div>
      <div class="space-y-2">
        <p class="text-[12px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">关键动态记录</p>
        <p id="modal-details" class="text-[13px] text-on-surface-variant/90 leading-relaxed">详情内容...</p>
      </div>
    </div>
  </div>
</body>
</html>
